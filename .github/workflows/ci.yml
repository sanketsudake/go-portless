name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        module: [".", "k8s", "cmd/portless"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test -race -count=2 ./...
      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

  core-deps:
    name: core stays stdlib-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check non-test imports are stdlib-only
        run: |
          deps=$(go list -deps ./... | grep -v '^github.com/sanketsudake/go-portless' || true)
          nonstd=$(echo "$deps" | xargs -r go list -f '{{if not .Standard}}{{.ImportPath}}{{end}}' 2>/dev/null || true)
          if [ -n "$nonstd" ]; then
            echo "core module imports non-stdlib packages in non-test code:"
            echo "$nonstd"
            exit 1
          fi

  lint:
    strategy:
      matrix:
        module: [".", "k8s", "cmd/portless"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: ${{ matrix.module }}

  govulncheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [".", "k8s", "cmd/portless"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
      - name: govulncheck
        working-directory: ${{ matrix.module }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  e2e-kind:
    name: k8s port-forward e2e (kind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: k8s/go.mod
      - uses: helm/kind-action@v1
        with:
          cluster_name: portless-e2e
      - name: Run e2e (pod-delete self-heal)
        working-directory: k8s
        run: go test -tags kinde2e -timeout 10m -run TestE2E ./...
